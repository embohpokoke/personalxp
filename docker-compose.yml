services:
  db:
    image: postgres:16-alpine
    container_name: personal-xp-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: personal_xp_local
    ports:
      - "54329:5432"
    volumes:
      - personal_xp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d personal_xp_local"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  personal_xp_pgdata:
